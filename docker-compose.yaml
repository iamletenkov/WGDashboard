services:
  wgdashboard:
    image: ghcr.io/wgdashboard/wgdashboard:d56a3cb
    container_name: wgdashboard
    restart: always
    environment:
      - tz=${TZ}
      - wgd_port=${WGD_PORT}
      - username=${USERNAME}
      - password=${PASSWORD}
      - global_dns=${GLOBAL_DNS}
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    ports:
      - "51821-51831:51821-51831/udp"
    expose:
      - "5000"
    volumes:
      - aconf:/etc/amnezia/amneziawg
      - conf:/etc/wireguard
      - data:/data
    networks:
      - internal

  # One-time: generate dummy self-signed cert so nginx can start
  certbot-init:
    image: alpine:3.21
    container_name: wg-certbot-init
    restart: "no"
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        CERT_DIR="/etc/letsencrypt/live/$${DOMAIN}"
        if [ -f "$${CERT_DIR}/fullchain.pem" ]; then
          echo "[init] Certificate already exists, skipping"
          exit 0
        fi
        echo "[init] No certificate found, generating self-signed placeholder..."
        apk add --no-cache openssl >/dev/null
        mkdir -p "$${CERT_DIR}"
        openssl req -x509 -nodes -days 1 \
          -newkey rsa:2048 \
          -keyout "$${CERT_DIR}/privkey.pem" \
          -out "$${CERT_DIR}/fullchain.pem" \
          -subj "/CN=$${DOMAIN}" 2>/dev/null
        echo "[init] Self-signed certificate created"

  nginx:
    image: nginx:1.27-alpine
    container_name: wg-nginx
    restart: always
    depends_on:
      certbot-init:
        condition: service_completed_successfully
      wgdashboard:
        condition: service_started
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./nginx/webroot:/var/www/certbot:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    container_name: wg-certbot
    restart: always
    stop_grace_period: 30s
    depends_on:
      nginx:
        condition: service_started
    environment:
      - DOMAIN=${DOMAIN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    volumes:
      - ./nginx/webroot:/var/www/certbot
      - ./nginx/ssl:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache docker-cli >/dev/null
        fi

        # Initial issuance if no real cert exists
        if ! certbot certificates 2>/dev/null | grep -q "$${DOMAIN}"; then
          echo "[certbot] Cleaning up self-signed placeholder..."
          rm -rf /etc/letsencrypt/live/$${DOMAIN}
          rm -rf /etc/letsencrypt/archive/$${DOMAIN}
          rm -f  /etc/letsencrypt/renewal/$${DOMAIN}.conf

          echo "[certbot] Requesting certificate for $${DOMAIN}..."
          certbot certonly --webroot -w /var/www/certbot \
            -d "$${DOMAIN}" \
            --email "$${CERTBOT_EMAIL}" \
            --agree-tos --non-interactive
          echo "[certbot] Reloading nginx with real certificate..."
          docker exec wg-nginx nginx -s reload || true
        fi

        # Renewal loop
        while true; do
          echo "[certbot] $(date -u) running renew..."
          certbot renew --webroot -w /var/www/certbot --quiet || true
          docker exec wg-nginx nginx -s reload || true
          sleep 12h
        done
    networks:
      - internal


networks:
  internal:
    driver: bridge


volumes:
  aconf:
  conf:
  data:
